# FORGED - Cloud Build Configuration
# ══════════════════════════════════════════════════════════════════════════════
# Runs tests, then builds and deploys both frontend and backend to Cloud Run
#
# Required substitutions (set in Cloud Build trigger or command line):
#   _REGION: Cloud Run region (e.g., us-central1)
#   _BACKEND_URL: Backend service URL (for frontend build)
#
# Usage:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_BACKEND_URL=https://forged-backend-xxx.run.app
# ══════════════════════════════════════════════════════════════════════════════

substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: forged-backend
  _FRONTEND_SERVICE: forged-frontend
  _TAG: latest

steps:
  # ════════════════════════════════════════════════════════════════════════════
  # Step 1: Run Backend Tests
  # ════════════════════════════════════════════════════════════════════════════
  - name: 'python:3.12-slim'
    id: 'test-backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        pip install --quiet -r requirements.txt
        pip install --quiet pytest
        echo "══════════════════════════════════════════════════════════════════"
        echo "Running Backend Tests"
        echo "══════════════════════════════════════════════════════════════════"
        DEV_MODE=true pytest tests/ -v --tb=short
        echo "✓ Backend tests passed"

  # ════════════════════════════════════════════════════════════════════════════
  # Step 2: Run Frontend Tests
  # ════════════════════════════════════════════════════════════════════════════
  - name: 'node:20-slim'
    id: 'test-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd frontend
        npm ci --quiet
        echo "══════════════════════════════════════════════════════════════════"
        echo "Running Frontend Tests"
        echo "══════════════════════════════════════════════════════════════════"
        npm run test:ci
        echo "✓ Frontend tests passed"

  # ════════════════════════════════════════════════════════════════════════════
  # Step 3: Build Backend Docker Image (only after tests pass)
  # ════════════════════════════════════════════════════════════════════════════
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    waitFor: ['test-backend']
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:${_TAG}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest'
      - './backend'

  # ════════════════════════════════════════════════════════════════════════════
  # Step 4: Build Frontend Docker Image (only after tests pass)
  # ════════════════════════════════════════════════════════════════════════════
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend-initial'
    waitFor: ['test-frontend']
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:build-check'
      - './frontend'

  # ════════════════════════════════════════════════════════════════════════════
  # Step 5: Push Backend Image
  # ════════════════════════════════════════════════════════════════════════════
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:${_TAG}'

  # ════════════════════════════════════════════════════════════════════════════
  # Step 6: Deploy Backend to Cloud Run
  # ════════════════════════════════════════════════════════════════════════════
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_BACKEND_SERVICE}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID,GCP_LOCATION=${_REGION},DEV_MODE=false'

  # ════════════════════════════════════════════════════════════════════════════
  # Step 7: Get Backend URL
  # ════════════════════════════════════════════════════════════════════════════
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'get-backend-url'
    waitFor: ['deploy-backend']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/backend_url.txt
        echo "Backend URL: $(cat /workspace/backend_url.txt)"

  # ════════════════════════════════════════════════════════════════════════════
  # Step 8: Build Frontend Docker Image (with Backend URL)
  # ════════════════════════════════════════════════════════════════════════════
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    waitFor: ['get-backend-url', 'build-frontend-initial']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        docker build \
          --build-arg VITE_API_URL=$${BACKEND_URL}/api \
          -t gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:${_TAG} \
          -t gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest \
          ./frontend

  # ════════════════════════════════════════════════════════════════════════════
  # Step 9: Push Frontend Image
  # ════════════════════════════════════════════════════════════════════════════
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:${_TAG}'

  # ════════════════════════════════════════════════════════════════════════════
  # Step 10: Deploy Frontend to Cloud Run
  # ════════════════════════════════════════════════════════════════════════════
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'

  # ════════════════════════════════════════════════════════════════════════════
  # Step 11: Print Deployment URLs
  # ════════════════════════════════════════════════════════════════════════════
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'print-urls'
    waitFor: ['deploy-frontend']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "═══════════════════════════════════════════════════════════════"
        echo "FORGED Deployment Complete!"
        echo "═══════════════════════════════════════════════════════════════"
        echo ""
        echo "✓ All tests passed"
        echo ""
        echo "Backend URL:"
        gcloud run services describe ${_BACKEND_SERVICE} --region=${_REGION} --format='value(status.url)'
        echo ""
        echo "Frontend URL:"
        gcloud run services describe ${_FRONTEND_SERVICE} --region=${_REGION} --format='value(status.url)'
        echo ""
        echo "═══════════════════════════════════════════════════════════════"

# Build images are pushed to Container Registry
images:
  - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:${_TAG}'
  - 'gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest'
  - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:${_TAG}'
  - 'gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest'

# Build timeout (20 minutes - increased for tests)
timeout: '1200s'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
